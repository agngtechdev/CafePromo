<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugiban Cafe - Promo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <main id="admin-view" class="hidden p-4 max-w-4xl mx-auto">
        <nav class="bg-black text-white p-4 rounded-xl mb-6 shadow-lg">
            <h1 class="font-bold tracking-tighter italic text-center">SUGIBAN CAFE - ADMIN DASHBOARD</h1>
        </nav>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <h2 class="font-bold mb-4">Titik Konvoi</h2>
                <div id="location-container" class="space-y-4"></div>
                <button onclick="addNewLocation()" class="w-full mt-4 border-2 border-dashed border-gray-300 py-3 rounded-xl text-gray-500 hover:bg-gray-50 text-sm">+ Tambah Titik Baru</button>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <h2 class="font-bold mb-4">Menu Hadiah</h2>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="menu-input" class="flex-1 border rounded-lg px-3 py-2 text-sm" placeholder="Nama menu...">
                    <button onclick="addMenu()" class="bg-black text-white px-4 py-2 rounded-lg text-sm">Tambah</button>
                </div>
                <ul id="menu-list" class="divide-y text-sm"></ul>
            </div>
        </div>
    </main>

    <main id="user-view" class="hidden p-6 flex items-center justify-center min-h-screen">
        <div id="user-card" class="bg-white w-full max-w-sm rounded-3xl shadow-2xl overflow-hidden border">
            </div>
    </main>

    <script>
        // ISI CONFIG FIREBASE KAMU DI SINI
        const firebaseConfig = {
            apiKey: "AIzaSyC8DUOY0lUMMAAhIGamREtV9GoQVnLwhfQ",
            authDomain: "gachamenu-b46e2.firebaseapp.com",
            databaseURL: "https://gachamenu-b46e2-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "gachamenu-b46e2",
            storageBucket: "gachamenu-b46e2.firebasestorage.app",
            messagingSenderId: "500919769738",
            appId: "1:500919769738:web:16c4ba211a8da6dd752b73"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const titikId = urlParams.get('id');

        window.onload = () => {
            if (titikId) {
                document.getElementById('user-view').classList.remove('hidden');
                checkUserStatus();
            } else {
                document.getElementById('admin-view').classList.remove('hidden');
                initAdminMonitoring();
            }
        };

        // --- USER LOGIC (ANTI-SPAM) ---
        function checkUserStatus() {
            const savedName = localStorage.getItem('user_name_' + titikId);
            if (savedName) {
                // User sudah pernah scan di titik ini, ambil data lama
                db.ref(`scans/${titikId}/${savedName}`).once('value', (snap) => {
                    if (snap.exists()) {
                        showWinPage(snap.val().menu, savedName);
                    } else {
                        showInputName();
                    }
                });
            } else {
                showInputName();
            }
        }

        function showInputName() {
            document.getElementById('user-card').innerHTML = `
                <div class="p-8 text-center">
                    <h2 class="text-xl font-bold mb-2 text-black">Halo! Selamat Datang</h2>
                    <p class="text-gray-500 text-sm mb-6">Masukkan nama kamu untuk klaim menu gratis.</p>
                    <input type="text" id="name-input" class="w-full border-2 border-gray-100 rounded-xl px-4 py-3 mb-4 focus:border-black outline-none transition" placeholder="Nama Panggilan/Lengkap">
                    <button onclick="submitScan()" class="w-full bg-black text-white font-bold py-4 rounded-xl shadow-lg">AMBIL HADIAH</button>
                </div>
            `;
        }

        function submitScan() {
            const name = document.getElementById('name-input').value.trim().toLowerCase();
            if (!name) return alert("Nama tidak boleh kosong!");

            // Cek di database apakah nama ini sudah pernah scan di titik ini
            db.ref(`scans/${titikId}/${name}`).once('value', (snap) => {
                if (snap.exists()) {
                    // Jika nama sudah ada, tampilkan menu yang lama (jangan tambah counter)
                    localStorage.setItem('user_name_' + titikId, name);
                    showWinPage(snap.val().menu, name);
                } else {
                    // Nama baru, proses scan asli
                    processNewScan(name);
                }
            });
        }

        function processNewScan(name) {
            db.ref('locations/' + titikId).transaction((loc) => {
                if (loc && loc.count < loc.max) {
                    loc.count++;
                    return loc;
                }
                return; // Abort jika penuh
            }, (error, committed, snapshot) => {
                if (committed) {
                    db.ref('menus').once('value', (menuSnap) => {
                        const menus = Object.values(menuSnap.val() || ["Kopi Susu"]);
                        const randomMenu = menus[Math.floor(Math.random() * menus.length)];
                        
                        // Simpan data scan user agar tidak bisa diulang
                        db.ref(`scans/${titikId}/${name}`).set({ menu: randomMenu });
                        localStorage.setItem('user_name_' + titikId, name);
                        
                        showWinPage(randomMenu, name);
                    });
                } else {
                    showFullPage();
                }
            });
        }

        function showWinPage(menu, name) {
            document.getElementById('user-card').innerHTML = `
                <div class="bg-black p-4 text-white text-[10px] text-center tracking-widest uppercase italic">SUGIBAN CAFE</div>
                <div class="p-8 text-center">
                    <p class="text-xs text-gray-400 uppercase tracking-widest mb-1">Klaim Berhasil: ${name}</p>
                    <div class="border-2 border-dashed border-gray-200 rounded-2xl py-8 my-4 bg-gray-50">
                        <h2 class="text-3xl font-black uppercase text-black px-4">${menu}</h2>
                    </div>
                    <p class="text-amber-600 font-bold text-sm animate-pulse">📸 SCREENSHOT SEKARANG!</p>
                </div>
            `;
        }

        function showFullPage() {
            document.getElementById('user-card').innerHTML = `<div class="p-10 text-center"><h2 class="text-2xl font-bold">Yah, Kuota Habis!</h2><p class="text-gray-500 mt-2 mb-8 text-sm">Ikuti konvoi kami ke titik selanjutnya!</p><a href="#" class="block w-full bg-black text-white py-4 rounded-xl font-bold">FOLLOW INSTAGRAM</a></div>`;
        }

        // --- ADMIN FUNCTIONS ---
        function initAdminMonitoring() {
            db.ref('locations').on('value', (snap) => {
                const data = snap.val();
                const cont = document.getElementById('location-container');
                cont.innerHTML = '';
                if(data) {
                    Object.keys(data).forEach(k => {
                        cont.innerHTML += `
                            <div class="p-4 bg-gray-50 rounded-xl border relative">
                                <button onclick="deleteLocation('${k}')" class="absolute top-2 right-2 text-gray-300">×</button>
                                <p class="text-[10px] font-bold text-gray-400 uppercase">${k}</p>
                                <p class="font-bold">${data[k].name}</p>
                                <div class="flex items-end justify-between mt-2">
                                    <h3 class="text-3xl font-mono">${data[k].count} <span class="text-xs text-gray-300">/ ${data[k].max}</span></h3>
                                    <button onclick="resetCounter('${k}')" class="text-[10px] border px-2 py-1 rounded bg-white shadow-sm">RESET</button>
                                </div>
                            </div>
                        `;
                    });
                }
            });
            db.ref('menus').on('value', (snap) => {
                const m = snap.val();
                const list = document.getElementById('menu-list');
                list.innerHTML = '';
                if(m) Object.keys(m).forEach(k => {
                    list.innerHTML += `<li class="py-2 flex justify-between">${m[k]} <button onclick="deleteMenu('${k}')" class="text-red-400 text-xs tracking-tighter">HAPUS</button></li>`;
                });
            });
        }

        function addNewLocation() {
            const n = prompt("Nama Lokasi:"), i = prompt("ID (titik1, titik2, dst):");
            if(n && i) db.ref('locations/' + i).set({ name: n, count: 0, max: 10 });
        }
        function deleteLocation(i) { if(confirm('Hapus?')) db.ref('locations/' + i).remove(); }
        function resetCounter(i) { if(confirm('Reset counter ke 0?')) { db.ref('locations/' + i + '/count').set(0); db.ref('scans/' + i).remove(); } }
        function addMenu() { const v = document.getElementById('menu-input').value; if(v) { db.ref('menus').push(v); document.getElementById('menu-input').value = ''; } }
        function deleteMenu(k) { db.ref('menus/' + k).remove(); }
    </script>
</body>
</html>
