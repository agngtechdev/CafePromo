<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugiban Cafe - Instant Promo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <main id="admin-view" class="hidden p-4 max-w-6xl mx-auto">
        <header class="bg-black text-white p-6 rounded-2xl mb-8 shadow-xl flex justify-between items-center">
            <h1 class="font-black italic text-xl tracking-widest">SUGIBAN ADMIN PANEL</h1>
            <div class="text-[10px] bg-green-500 px-2 py-1 rounded">SYSTEM READY</div>
        </header>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="font-bold text-lg mb-4 text-slate-800">Monitoring Realtime</h2>
                    <div id="location-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    <button onclick="addNewLocation()" class="w-full mt-4 border-2 border-dashed border-slate-300 py-3 rounded-xl text-slate-400 hover:text-black hover:border-black transition text-sm font-medium">+ Buat Titik Baru</button>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="font-bold text-lg mb-4 text-red-600">Log Pengambilan Menu</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead>
                                <tr class="border-b text-slate-400">
                                    <th class="py-2">Titik</th>
                                    <th>Menu Hadiah</th>
                                    <th>Waktu</th>
                                    <th>Device ID</th>
                                </tr>
                            </thead>
                            <tbody id="log-body" class="divide-y"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 h-fit">
                <h2 class="font-bold text-lg mb-4">Pool Menu Hadiah</h2>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="menu-input" class="flex-1 border rounded-xl px-4 py-2 text-sm outline-none focus:ring-2 ring-black" placeholder="Nama Menu...">
                    <button onclick="addMenu()" class="bg-black text-white px-4 py-2 rounded-xl text-sm font-bold">TAMBAH</button>
                </div>
                <ul id="menu-list" class="space-y-2"></ul>
            </div>
        </div>
    </main>

    <main id="user-view" class="hidden p-6 flex items-center justify-center min-h-screen">
        <div id="user-card" class="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
            <div class="p-12 text-center" id="user-status-content">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-black mx-auto mb-4"></div>
                <p class="text-slate-500 font-bold animate-pulse">MENYIAPKAN HADIAH...</p>
            </div>
        </div>
    </main>

    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyC8DUOY0lUMMAAhIGamREtV9GoQVnLwhfQ",
        authDomain: "gachamenu-b46e2.firebaseapp.com",
        databaseURL: "https://gachamenu-b46e2-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "gachamenu-b46e2",
        storageBucket: "gachamenu-b46e2.firebasestorage.app",
        messagingSenderId: "500919769738",
        appId: "1:500919769738:web:16c4ba211a8da6dd752b73"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const titikId = urlParams.get('id');

    window.onload = async () => {
        if (titikId) {
            document.getElementById('user-view').classList.remove('hidden');
            const cleanId = titikId.toLowerCase().trim();
            
            // Validasi Titik
            db.ref('locations/' + cleanId).once('value', (snap) => {
                if (!snap.exists()) {
                    showError("Lokasi tidak valid!");
                } else {
                    startInstantClaim(cleanId);
                }
            });
        } else {
            document.getElementById('admin-view').classList.remove('hidden');
            initAdminMonitoring();
        }
    };

    // Fungsi Membuat ID Unik Tanpa Nama (Fingerprint Sederhana)
    async function generateDeviceId() {
        const userAgent = navigator.userAgent.replace(/\D/g, '');
        const screenStr = screen.width + "x" + screen.height;
        let ip = "000";
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            ip = data.ip.replace(/\./g, '_');
        } catch (e) {}
        return `dev_${userAgent.slice(-5)}_${screenStr}_${ip}`;
    }

    async function startInstantClaim(cleanId) {
        const deviceId = await generateDeviceId();
        const localKey = 'claimed_' + cleanId;
        
        // 1. Cek LocalStorage dulu (Refresh Defense)
        const cached = localStorage.getItem(localKey);
        if (cached) {
            const data = JSON.parse(cached);
            showWinPage(data.menu);
            return;
        }

        // 2. Cek ke Database (Refresh Defense - jika user hapus cache)
        db.ref(`scans/${cleanId}/${deviceId}`).once('value', (snap) => {
            if (snap.exists()) {
                const data = snap.val();
                localStorage.setItem(localKey, JSON.stringify(data));
                showWinPage(data.menu);
            } else {
                executeAutoTransaction(cleanId, deviceId, localKey);
            }
        });
    }

    function executeAutoTransaction(cleanId, deviceId, localKey) {
        const locRef = db.ref('locations/' + cleanId);
        
        locRef.transaction((loc) => {
            if (loc) {
                if (parseInt(loc.count) < parseInt(loc.max)) {
                    loc.count = (parseInt(loc.count) || 0) + 1;
                    return loc;
                }
            }
            return; 
        }, (error, committed, snapshot) => {
            if (committed && snapshot.exists()) {
                db.ref('menus').once('value', (menuSnap) => {
                    const menus = menuSnap.exists() ? Object.values(menuSnap.val()) : ["Menu Rahasia"];
                    const randomMenu = menus[Math.floor(Math.random() * menus.length)];
                    const claimData = { menu: randomMenu, time: new Date().toLocaleString(), device: deviceId };
                    
                    // Simpan permanen
                    db.ref(`scans/${cleanId}/${deviceId}`).set(claimData);
                    localStorage.setItem(localKey, JSON.stringify(claimData));
                    
                    showWinPage(randomMenu);
                });
            } else {
                showFullPage();
            }
        });
    }

    function showWinPage(menu) {
        document.getElementById('user-card').innerHTML = `
            <div class="bg-black p-4 text-white text-[10px] text-center tracking-[0.3em] font-bold">SUGIBAN CAFE</div>
            <div class="p-10 text-center animate-content">
                <p class="text-xs text-slate-400 uppercase font-bold mb-2">KAMU MENDAPATKAN:</p>
                <div class="bg-slate-50 border-4 border-double border-slate-200 rounded-3xl py-10 mb-8 px-4">
                    <h2 class="text-3xl font-black uppercase leading-tight">${menu}</h2>
                </div>
                <div class="bg-yellow-50 border border-yellow-200 p-5 rounded-2xl">
                    <p class="text-yellow-800 font-black text-sm mb-1 uppercase">📸 SCREENSHOT SEKARANG!</p>
                    <p class="text-yellow-700 text-[10px]">Tunjukkan ke kasir. Jangan di-refresh.</p>
                </div>
            </div>`;
    }

    function showFullPage() {
        document.getElementById('user-card').innerHTML = `
            <div class="p-12 text-center">
                <h2 class="text-5xl mb-6">🏃</h2>
                <h2 class="text-2xl font-black uppercase">Kuota Habis!</h2>
                <p class="text-slate-500 mt-4 text-sm leading-relaxed">Maaf, kuota untuk titik ini sudah penuh.</p>
            </div>`;
    }

    function showError(msg) {
        document.getElementById('user-card').innerHTML = `<div class="p-10 text-center text-red-500 font-bold">${msg}</div>`;
    }

    // --- ADMIN LOGIC (SAMA SEPERTI SEBELUMNYA) ---
    function initAdminMonitoring() {
        db.ref('locations').on('value', (snap) => {
            const data = snap.val();
            const cont = document.getElementById('location-container');
            cont.innerHTML = '';
            if(data) Object.keys(data).forEach(k => {
                cont.innerHTML += `
                    <div class="p-5 bg-slate-50 rounded-2xl border border-slate-100 relative group">
                        <button onclick="deleteLocation('${k}')" class="absolute top-3 right-3 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition text-xs">Hapus</button>
                        <p class="text-[10px] font-black text-blue-500 uppercase mb-1">ID: ${k}</p>
                        <p class="font-bold text-slate-800">${data[k].name}</p>
                        <div class="flex items-end justify-between mt-4">
                            <h3 class="text-4xl font-black">${data[k].count}<span class="text-sm text-slate-300 font-normal ml-1">/ ${data[k].max}</span></h3>
                            <button onclick="resetTitik('${k}')" class="text-[10px] font-bold bg-white border shadow-sm px-3 py-1.5 rounded-lg hover:bg-red-50 hover:text-red-600 transition">RESET</button>
                        </div>
                    </div>`;
            });
        });

        db.ref('menus').on('value', (snap) => {
            const m = snap.val();
            const list = document.getElementById('menu-list');
            list.innerHTML = '';
            if(m) Object.keys(m).forEach(k => {
                list.innerHTML += `<li class="flex justify-between items-center bg-slate-50 p-3 rounded-xl text-xs font-bold uppercase">${m[k]} <button onclick="deleteMenu('${k}')" class="text-red-400 ml-2">X</button></li>`;
            });
        });

        db.ref('scans').on('value', (snap) => {
            const logBody = document.getElementById('log-body');
            logBody.innerHTML = '';
            const allScans = snap.val();
            if(allScans) {
                Object.keys(allScans).forEach(locId => {
                    Object.keys(allScans[locId]).forEach(scanKey => {
                        const s = allScans[locId][scanKey];
                        logBody.innerHTML += `
                            <tr class="text-slate-600 border-b last:border-0">
                                <td class="py-3 font-bold text-blue-500">${locId}</td>
                                <td>${s.menu}</td>
                                <td class="text-[10px]">${s.time}</td>
                                <td class="font-mono text-[9px] text-slate-300">${s.device.substring(0,15)}...</td>
                            </tr>`;
                    });
                });
            }
        });
    }

    function addNewLocation() {
        const n = prompt("Nama Lokasi:"), i = prompt("ID Unik (URL):");
        if(n && i) db.ref('locations/' + i.toLowerCase().trim()).set({ name: n, count: 0, max: 10 });
    }
    function resetTitik(id) { if(confirm('Reset counter dan hapus data user di titik ini?')) { db.ref('locations/' + id + '/count').set(0); db.ref('scans/' + id).remove(); localStorage.clear(); } }
    function deleteLocation(id) { if(confirm('Hapus titik?')) db.ref('locations/' + id).remove(); }
    function addMenu() { const v = document.getElementById('menu-input').value; if(v) { db.ref('menus').push(v); document.getElementById('menu-input').value = ''; } }
    function deleteMenu(k) { db.ref('menus/' + k).remove(); }
    </script>

    <style>
        .animate-content { animation: slideUp 0.5s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</body>
</html>
