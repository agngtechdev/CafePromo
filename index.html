<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugiban Cafe - Promo Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        .pop-in { animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <main id="admin-view" class="hidden p-4 max-w-4xl mx-auto">
        <header class="bg-black text-white p-6 rounded-2xl mb-8 shadow-xl flex justify-between items-center">
            <h1 class="font-black italic text-xl tracking-widest uppercase">Admin Sugiban</h1>
            <div class="text-[10px] bg-green-500 px-2 py-1 rounded">DASHBOARD</div>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="font-bold text-lg mb-4">Titik Konvoi (URL)</h2>
                <div id="location-container" class="space-y-3"></div>
                <button onclick="addNewLocation()" class="w-full mt-4 border-2 border-dashed border-slate-300 py-3 rounded-xl text-slate-400 hover:text-black hover:border-black transition text-sm">+ Tambah Titik</button>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="font-bold text-lg mb-4">Pool Menu Hadiah</h2>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="menu-input" class="flex-1 border rounded-xl px-4 py-2 text-sm outline-none focus:ring-2 ring-black" placeholder="Nama Menu...">
                    <button onclick="addMenu()" class="bg-black text-white px-4 py-2 rounded-xl text-sm font-bold">TAMBAH</button>
                </div>
                <ul id="menu-list" class="space-y-2"></ul>
            </div>
        </div>
    </main>

    <main id="user-view" class="hidden p-6 flex items-center justify-center min-h-screen">
        <div id="user-card" class="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100 pop-in">
            <div id="user-loading" class="p-12 text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-black mx-auto mb-4"></div>
                <p class="text-slate-500 font-bold">MENGACAK MENU...</p>
            </div>
            <div id="user-result" class="hidden">
                <div class="bg-black p-4 text-white text-[10px] text-center tracking-[0.3em] font-bold uppercase">Sugiban Cafe Promo</div>
                <div class="p-10 text-center">
                    <p class="text-xs text-slate-400 uppercase font-bold mb-2">Kamu Mendapatkan:</p>
                    <div class="bg-slate-50 border-4 border-double border-slate-200 rounded-3xl py-10 mb-6 px-4">
                        <h2 id="display-menu" class="text-3xl font-black uppercase leading-tight text-black">...</h2>
                    </div>
                    
                    <button id="btn-wa" class="w-full bg-green-500 hover:bg-green-600 text-white font-black py-5 rounded-2xl shadow-lg transition flex items-center justify-center gap-3 group">
                        <span>KLAIM VIA WHATSAPP</span>
                        <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                    </button>
                    <p class="text-[10px] text-slate-400 mt-6 uppercase tracking-widest font-bold">Sugiban Cafe - Makassar</p>
                </div>
            </div>
        </div>
    </main>

    <script>
    // --- KONFIGURASI FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyC8DUOY0lUMMAAhIGamREtV9GoQVnLwhfQ",
        authDomain: "gachamenu-b46e2.firebaseapp.com",
        databaseURL: "https://gachamenu-b46e2-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "gachamenu-b46e2",
        storageBucket: "gachamenu-b46e2.firebasestorage.app",
        messagingSenderId: "500919769738",
        appId: "1:500919769738:web:16c4ba211a8da6dd752b73"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const titikId = urlParams.get('id');

    window.onload = () => {
        if (titikId) {
            document.getElementById('user-view').classList.remove('hidden');
            handleUserFlow(titikId.toLowerCase().trim());
        } else {
            document.getElementById('admin-view').classList.remove('hidden');
            initAdminMonitoring();
        }
    };

    // --- LOGIKA USER ---
    function handleUserFlow(cleanId) {
        // 1. Cek apakah titik ini aktif di database
        db.ref('locations/' + cleanId).once('value', (snap) => {
            if (!snap.exists()) {
                document.getElementById('user-loading').innerHTML = `<p class="text-red-500 font-bold uppercase">Error: Titik Tidak Valid!</p>`;
                return;
            }

            // 2. Ambil Menu Secara Acak
            db.ref('menus').once('value', (menuSnap) => {
                const menuData = menuSnap.val();
                let randomMenu = "Kopi Susu"; // Default jika kosong

                if (menuData) {
                    const menuList = Object.values(menuData);
                    randomMenu = menuList[Math.floor(Math.random() * menuList.length)];
                }

                // 3. Tampilkan ke User
                setTimeout(() => {
                    document.getElementById('user-loading').classList.add('hidden');
                    document.getElementById('user-result').classList.remove('hidden');
                    document.getElementById('display-menu').innerText = randomMenu;

                    // 4. Setup Tombol WhatsApp
                    const adminWA = "6282299967112"; // Format internasional tanpa +
                    const pesan = encodeURIComponent(`Halo kak, saya mendapatkan menu : ${randomMenu}`);
                    document.getElementById('btn-wa').onclick = () => {
                        // Tambah counter secara silent (opsional untuk statistik admin)
                        db.ref('locations/' + cleanId + '/count').transaction(c => (c || 0) + 1);
                        window.location.href = `https://wa.me/${adminWA}?text=${pesan}`;
                    };
                }, 1000); // Delay 1 detik untuk efek loading
            });
        });
    }

    // --- LOGIKA ADMIN ---
    function initAdminMonitoring() {
        // Monitor Titik
        db.ref('locations').on('value', (snap) => {
            const data = snap.val();
            const cont = document.getElementById('location-container');
            cont.innerHTML = '';
            if(data) Object.keys(data).forEach(k => {
                cont.innerHTML += `
                    <div class="p-4 bg-slate-50 rounded-xl border border-slate-100 flex justify-between items-center">
                        <div>
                            <p class="text-[10px] font-black text-blue-500">ID: ${k}</p>
                            <p class="font-bold text-slate-800 text-sm">${data[k].name}</p>
                            <p class="text-[10px] text-slate-400">Total Klaim: ${data[k].count || 0}</p>
                        </div>
                        <button onclick="deleteLocation('${k}')" class="text-red-400 text-xs hover:font-bold">Hapus</button>
                    </div>`;
            });
        });

        // Monitor Menu
        db.ref('menus').on('value', (snap) => {
            const m = snap.val();
            const list = document.getElementById('menu-list');
            list.innerHTML = '';
            if(m) Object.keys(m).forEach(k => {
                list.innerHTML += `<li class="flex justify-between items-center bg-slate-50 p-3 rounded-xl text-xs font-bold uppercase">${m[k]} <button onclick="deleteMenu('${k}')" class="text-red-400">X</button></li>`;
            });
        });
    }

    function addNewLocation() {
        const n = prompt("Nama Lokasi:"), i = prompt("ID URL (Tanpa spasi):");
        if(n && i) db.ref('locations/' + i.toLowerCase().trim()).set({ name: n, count: 0 });
    }
    function addMenu() {
        const v = document.getElementById('menu-input').value;
        if(v) { db.ref('menus').push(v); document.getElementById('menu-input').value = ''; }
    }
    function deleteLocation(id) { if(confirm('Hapus titik?')) db.ref('locations/' + id).remove(); }
    function deleteMenu(k) { db.ref('menus/' + k).remove(); }
    </script>
</body>
</html>
